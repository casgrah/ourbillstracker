<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CXC Income Tracker · casgrahtools</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#2d6b73;--teal-light:#3d8a94;--teal-pale:#e8f4f5;--teal-mid:#c2dde0;
  --terra:#b85c38;--terra-light:#d4724e;--terra-pale:#faf0eb;
  --cream:#fdfaf6;--ink:#1e2e30;--muted:#6b8487;--border:#ccdfe2;
  --success:#2d7a4f;--success-pale:#e8f5ee;--navy:#0f1e20;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;font-size:14px;}

/* AUTH */
#auth-overlay{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:20px;}
#auth-overlay h1{color:#fff;font-size:26px;font-weight:700;font-family:'Caveat',cursive;}
#auth-overlay p{color:rgba(255,255,255,.55);font-size:13px;text-align:center;max-width:300px;}
#sign-in-btn{display:flex;align-items:center;gap:10px;background:#fff;color:var(--ink);border:none;border-radius:10px;padding:12px 24px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:transform .15s,box-shadow .15s;}
#sign-in-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.25);}
#sign-in-btn svg{width:20px;height:20px;}
#app{display:none;min-height:100vh;flex-direction:column;}
#app.visible{display:flex;}

/* HEADER */
.header{background:var(--teal);padding:14px 24px;display:flex;align-items:center;gap:14px;border-bottom:3px solid var(--terra);}
.logo-wrap img{width:44px;height:44px;object-fit:cover;border-radius:50%;border:2px solid rgba(255,255,255,0.3);}
.header-text h1{font-family:'Caveat',cursive;font-size:24px;font-weight:700;color:#fff;line-height:1;}
.header-text p{font-size:11px;color:rgba(255,255,255,0.65);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
.header-actions{margin-left:auto;display:flex;gap:8px;align-items:center;}
.hub-btn{padding:7px 14px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;background:transparent;color:rgba(255,255,255,0.55);border:1.5px solid rgba(255,255,255,0.25);text-decoration:none;transition:all .15s;}
.hub-btn:hover{color:white;border-color:rgba(255,255,255,0.5);}
.btn-outline{padding:7px 14px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:white;border:1.5px solid rgba(255,255,255,0.45);transition:all .15s;}
.btn-outline:hover{background:rgba(255,255,255,0.1);}
.user-btn{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.7);font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 12px;border-radius:6px;cursor:pointer;}

/* SUMMARY */
.summary-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:12px 24px;background:white;border-bottom:1px solid var(--border);}
.stat-card{background:var(--teal-pale);border-radius:8px;padding:12px 14px;border:1px solid var(--teal-mid);}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:3px;display:flex;align-items:center;justify-content:space-between;}
.stat-value{font-size:21px;font-weight:700;color:var(--teal);font-family:'Caveat',cursive;}
.stat-value.terra{color:var(--terra);}
.stat-value.success{color:var(--success);}
.stat-value.neutral{color:var(--ink);}
.filter-card{background:white;border:1.5px solid var(--teal-mid);}
.filter-select{width:100%;padding:4px 7px;border:1.5px solid var(--border);border-radius:5px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--ink);background:white;outline:none;cursor:pointer;}
.filter-select:focus{border-color:var(--teal);}
.filter-row{display:flex;gap:4px;align-items:center;}
.filter-btns{display:flex;gap:3px;margin-top:4px;}
.filter-btn{flex:1;padding:3px 4px;border-radius:10px;font-size:10px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:white;color:var(--muted);transition:all .15s;font-family:'DM Sans',sans-serif;}
.filter-btn.active{background:var(--teal);color:white;border-color:var(--teal);}
.clear-filter{font-size:10px;color:var(--terra);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;text-decoration:underline;}

/* SYNC STATUS */
.sync-bar{padding:6px 24px;background:#f0faf5;border-bottom:1px solid #c2dde0;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0;}
.sync-dot.synced{background:var(--success);}
.sync-dot.syncing{background:#f59e0b;animation:pulse 1s infinite;}
.sync-dot.error{background:var(--terra);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* MAIN */
.main{padding:16px 24px;display:grid;grid-template-columns:1fr 340px;gap:16px;}
.panel{background:white;border-radius:12px;border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;}
.panel-header{padding:11px 18px;background:var(--teal);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.panel-title{font-family:'Caveat',cursive;font-size:19px;color:white;font-weight:600;}
.export-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:white;font-size:12px;font-weight:500;padding:4px 10px;border-radius:5px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.export-btn:hover{background:rgba(255,255,255,.25);}
.list-headers{display:grid;grid-template-columns:1fr 46px 66px 68px 68px 50px;gap:5px;padding:6px 18px;font-size:10px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);border-bottom:1px solid var(--border);background:#f8fbfc;flex-shrink:0;}
.col-r{text-align:right;}
.orders-list{overflow-y:auto;max-height:calc(100vh - 360px);}

/* ORDERS */
.order-group{border-bottom:2px solid var(--teal-pale);}
.order-group-header{padding:8px 18px;display:flex;align-items:center;gap:6px;background:var(--teal-pale);cursor:pointer;user-select:none;}
.order-group-header:hover{background:var(--teal-mid);}
.order-id-badge{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;background:var(--teal);color:white;padding:2px 7px;border-radius:10px;flex-shrink:0;}
.order-customer{font-weight:600;font-size:13px;}
.order-date{font-size:11px;color:var(--muted);margin-left:auto;flex-shrink:0;}
.delivery-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;flex-shrink:0;}
.badge-shipped{background:#e8f0ff;color:#3a5bbf;}
.badge-hand{background:#f0f9eb;color:#3a7a2a;}
.badge-tbd{background:#f5f5f5;color:#888;}
.order-status{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;}
.status-complete{background:var(--success-pale);color:var(--success);}
.status-pending{background:#fff8e6;color:#a0700a;}
.chevron{font-size:10px;color:var(--muted);transition:transform .15s;flex-shrink:0;}
.chevron.open{transform:rotate(180deg);}
.line-item{display:grid;grid-template-columns:1fr 46px 66px 68px 68px 50px;align-items:center;gap:5px;padding:7px 18px;font-size:12.5px;border-bottom:1px solid #f0f4f5;transition:background .1s;}
.line-item:hover{background:var(--teal-pale);}
.item-name{font-weight:500;}
.item-num{text-align:right;color:var(--muted);font-size:12px;}
.item-profit{text-align:right;font-weight:600;color:var(--success);}
.tbd{font-size:10px;color:var(--terra);font-style:italic;}
.row-actions{display:flex;gap:3px;justify-content:flex-end;}
.icon-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 3px;border-radius:3px;color:#ccc;line-height:1;}
.icon-btn.edit:hover{color:var(--teal);}
.icon-btn.del:hover{color:var(--terra);}
.ship-detail-row{display:flex;gap:16px;padding:6px 18px 7px;background:#f8fbfc;border-bottom:1px solid #f0f4f5;font-size:11.5px;align-items:center;}
.ship-detail-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.8px;}
.ship-detail-val{font-weight:600;}
.ship-charged{color:#3a5bbf;}
.ship-cost{color:var(--terra);}
.ship-net-pos{color:var(--success);}
.ship-net-neg{color:var(--terra);}
.order-subtotal{padding:7px 18px;display:flex;justify-content:flex-end;gap:18px;background:#f8fbfc;font-size:12px;align-items:center;}
.subtotal-item{display:flex;gap:5px;align-items:center;}
.subtotal-label{color:var(--muted);}
.subtotal-val{font-weight:600;color:var(--teal);}
.order-note{font-size:11px;color:var(--muted);font-style:italic;margin-right:auto;}
.empty-state{text-align:center;padding:44px 24px;color:var(--muted);}
.empty-dino{font-size:44px;margin-bottom:10px;}

/* FORM */
.form-panel{display:flex;flex-direction:column;gap:14px;}
.form-card{background:white;border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.form-card-header{padding:11px 16px;background:var(--terra);display:flex;align-items:center;justify-content:space-between;}
.form-card-title{font-family:'Caveat',cursive;font-size:19px;color:white;font-weight:600;}
.form-mode-badge{font-size:10px;background:rgba(255,255,255,.2);color:white;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.form-body{padding:14px 16px;display:flex;flex-direction:column;gap:9px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);display:block;margin-bottom:3px;}
input,select{width:100%;padding:7px 9px;border:1.5px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);background:white;transition:border-color .15s;outline:none;}
input:focus,select:focus{border-color:var(--teal);}
.ship-section{background:var(--teal-pale);border-radius:8px;padding:10px;border:1px solid var(--teal-mid);display:flex;flex-direction:column;gap:8px;}
.ship-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--teal);}
.ship-fields{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.ship-na{font-size:11px;color:var(--muted);font-style:italic;padding:4px 0;}
.line-items-section{display:flex;flex-direction:column;gap:7px;}
.line-item-form{display:grid;grid-template-columns:1fr 36px 62px 62px 16px;gap:5px;align-items:end;}
.add-line-btn{background:var(--teal-pale);border:1.5px dashed var(--teal-mid);border-radius:6px;color:var(--teal);font-size:12px;font-weight:500;padding:6px;cursor:pointer;width:100%;transition:all .15s;font-family:'DM Sans',sans-serif;}
.add-line-btn:hover{background:var(--teal-mid);}
.remove-line{background:none;border:none;cursor:pointer;color:#ccc;font-size:15px;padding:0 0 1px;transition:color .15s;align-self:end;}
.remove-line:hover{color:var(--terra);}
.submit-btn{width:100%;padding:11px;background:var(--teal);color:white;border:none;border-radius:8px;font-family:'Caveat',cursive;font-size:20px;font-weight:600;cursor:pointer;transition:background .15s;}
.submit-btn:hover{background:var(--teal-light);}
.cancel-btn{width:100%;padding:8px;background:none;color:var(--muted);border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;}
.cancel-btn:hover{border-color:var(--terra);color:var(--terra);}
.divider{border:none;border-top:1px solid var(--border);margin:2px 0;}
#toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;transform:translateY(60px);opacity:0;transition:all .25s;z-index:999;pointer-events:none;}
#toast.show{transform:translateY(0);opacity:1;}
</style>
</head>

<script>
const CLIENT_ID  = '1049044356656-ecjtelk23gknpf1hc7kp3jt2kue56mlg.apps.googleusercontent.com';
const SHEET_ID   = '11DuEx40pI_qXn9638AsAZTCb4CiISSnS1s1h4FXA8XQ';
const SCOPES     = 'https://www.googleapis.com/auth/spreadsheets';
const SHEET_NAME = 'Orders';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let accessToken = null;
let orders = [];
let statusFilter = 'all';
let editingIdx = null;
let lineCount = 0;

// ── Auth ──────────────────────────────────────────────────────────────────────
async function initAuth() {
  const s = document.createElement('script');
  s.src = 'https://accounts.google.com/gsi/client';
  document.head.appendChild(s);
  await new Promise(r => s.onload = r);
  const stored = localStorage.getItem('cxc_token');
  if (stored) { accessToken = stored; showApp(); return; }
  document.getElementById('sign-in-btn').onclick = () => {
    google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID, scope: SCOPES,
      callback: resp => { if (resp.access_token) { accessToken = resp.access_token; localStorage.setItem('cxc_token', accessToken); showApp(); } }
    }).requestAccessToken();
  };
}

function signOut() {
  accessToken = null; localStorage.removeItem('cxc_token');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth-overlay').style.display = 'flex';
  orders = [];
}

async function showApp() {
  document.getElementById('auth-overlay').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  setSyncStatus('syncing', 'Loading orders...');
  await ensureSheet();
  await loadOrders();
  resetForm();
  render();
}

// ── Sheets API ────────────────────────────────────────────────────────────────
async function api(path, method='GET', body=null) {
  const opts = { headers: { Authorization: `Bearer ${accessToken}` } };
  if (body) { opts.method = method; opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  else opts.method = method;
  const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}${path}`, opts);
  if (!r.ok) throw new Error(`${method} ${path}: ${r.status}`);
  return r.json();
}
async function sheetsGet(range) { const d = await api(`/values/${encodeURIComponent(range)}`); return d.values || []; }
async function sheetsUpdate(range, values) { return api(`/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`, 'PUT', { range, majorDimension:'ROWS', values }); }
async function sheetsAppend(range, values) { return api(`/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`, 'POST', { range, majorDimension:'ROWS', values }); }
async function sheetsClear(range) { return api(`/values/${encodeURIComponent(range)}:clear`, 'POST'); }
async function getSheetsList() { const d = await api(''); return (d.sheets||[]).map(s => s.properties.title); }
async function addSheet(title) { return api(':batchUpdate', 'POST', { requests: [{ addSheet: { properties: { title } } }] }); }

// ── Sheet setup ───────────────────────────────────────────────────────────────
// Columns: A=OrderID B=Customer C=Date D=Delivery E=ShipCharged F=ShipCost
//          G=Notes H=PayStatus I=FulfillStatus J=ItemName K=Qty L=UnitPrice M=Expense
// One row per line item. Order-level fields repeated on first item row.
const HEADERS = ['OrderID','Customer','Date','Delivery','ShipCharged','ShipCost','Notes','PayStatus','FulfillStatus','ItemName','Qty','UnitPrice','Expense'];

async function ensureSheet() {
  const sheets = await getSheetsList();
  if (!sheets.includes(SHEET_NAME)) {
    await addSheet(SHEET_NAME);
    await sheetsUpdate(`${SHEET_NAME}!A1:M1`, [HEADERS]);
    // Seed with default orders
    const rows = ordersToRows(defaultOrders);
    if (rows.length) await sheetsAppend(`${SHEET_NAME}!A2:M`, rows);
  }
}

// ── Data helpers ──────────────────────────────────────────────────────────────
function ordersToRows(ords) {
  const rows = [];
  for (const o of ords) {
    for (let i = 0; i < o.items.length; i++) {
      const item = o.items[i];
      rows.push([
        i===0 ? o.id : '',
        i===0 ? o.customer : '',
        i===0 ? o.date : '',
        i===0 ? (o.deliveryMethod||'tbd') : '',
        i===0 ? (o.shipCharged!=null ? o.shipCharged : '') : '',
        i===0 ? (o.shipCost!=null ? o.shipCost : '') : '',
        i===0 ? (o.notes||'') : '',
        i===0 ? (o.payStatus||'paid') : '',
        i===0 ? (o.fulfillStatus||'complete') : '',
        item.name||'',
        item.qty||1,
        item.unitPrice||0,
        item.expense!=null ? item.expense : ''
      ]);
    }
  }
  return rows;
}

function rowsToOrders(rows) {
  const result = [];
  let current = null;
  for (const r of rows) {
    if (!r || r.length < 10) continue;
    const orderId = r[0]?.trim();
    const itemName = r[9]?.trim();
    if (!itemName) continue;
    if (orderId) {
      current = {
        id: orderId,
        customer: r[1]||'',
        date: r[2]||'',
        deliveryMethod: r[3]||'tbd',
        shipCharged: r[4]!=='' ? parseFloat(r[4]) : null,
        shipCost: r[5]!=='' ? parseFloat(r[5]) : null,
        notes: r[6]||'',
        payStatus: r[7]||'paid',
        fulfillStatus: r[8]||'complete',
        items: [],
        _startRow: rows.indexOf(r) + 2
      };
      result.push(current);
    }
    if (current) {
      current.items.push({
        name: itemName,
        qty: r[10] ? parseInt(r[10]) : 1,
        unitPrice: r[11] ? parseFloat(r[11]) : 0,
        expense: r[12]!=='' ? parseFloat(r[12]) : null,
        _row: rows.indexOf(r) + 2
      });
    }
  }
  return result;
}

async function loadOrders() {
  try {
    const rows = await sheetsGet(`${SHEET_NAME}!A2:M1000`);
    orders = rowsToOrders(rows);
    setSyncStatus('synced', `Synced · ${orders.length} orders`);
  } catch(e) {
    setSyncStatus('error', 'Sync error — check connection');
    console.error(e);
  }
}

async function saveNewOrder(order) {
  const rows = ordersToRows([order]);
  await sheetsAppend(`${SHEET_NAME}!A2:M`, rows);
}

async function updateOrderInSheet(order) {
  // Find the start row and clear old rows, then rewrite
  // We use order._startRow if available, otherwise search
  try {
    const allRows = await sheetsGet(`${SHEET_NAME}!A2:M1000`);
    let startRow = -1, rowCount = 0;
    for (let i = 0; i < allRows.length; i++) {
      if (allRows[i][0]?.trim() === order.id) {
        startRow = i + 2;
        // count consecutive rows for this order
        rowCount = 0;
        for (let j = i; j < allRows.length; j++) {
          if (j === i || !allRows[j][0]?.trim()) rowCount++;
          else break;
        }
        break;
      }
    }
    if (startRow < 0) { await saveNewOrder(order); return; }
    // Clear old rows
    await sheetsClear(`${SHEET_NAME}!A${startRow}:M${startRow + rowCount - 1}`);
    // Write new rows
    const newRows = ordersToRows([order]);
    await sheetsUpdate(`${SHEET_NAME}!A${startRow}:M${startRow + newRows.length - 1}`, newRows);
  } catch(e) { console.error('update failed', e); throw e; }
}

async function deleteOrderFromSheet(orderId) {
  const allRows = await sheetsGet(`${SHEET_NAME}!A2:M1000`);
  let startRow = -1, rowCount = 0;
  for (let i = 0; i < allRows.length; i++) {
    if (allRows[i][0]?.trim() === orderId) {
      startRow = i + 2; rowCount = 0;
      for (let j = i; j < allRows.length; j++) {
        if (j === i || !allRows[j][0]?.trim()) rowCount++;
        else break;
      }
      break;
    }
  }
  if (startRow > 0) await sheetsClear(`${SHEET_NAME}!A${startRow}:M${startRow + rowCount - 1}`);
}

// ── Sync status ───────────────────────────────────────────────────────────────
function setSyncStatus(state, msg) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncMsg');
  dot.className = 'sync-dot ' + state;
  txt.textContent = msg;
}

// ── Calculations ──────────────────────────────────────────────────────────────
function calcOrder(o) {
  let itemSale=0, itemExp=0;
  for (const i of o.items) { itemSale+=(i.qty||1)*(i.unitPrice||0); if(i.expense!=null) itemExp+=i.expense; }
  const sc=o.shipCharged||0, sk=o.shipCost||0;
  const totalSale=itemSale+sc, totalExp=itemExp+sk;
  const profit=totalSale-totalExp;
  return {itemSale,itemExp,totalSale,totalExp,profit,margin:totalSale>0?profit/totalSale:null,shipCharged:sc,shipCost:sk,shipNet:sc-sk};
}
function fmt(v) { return (v===null||v===undefined||isNaN(v)) ? '—' : '$'+Number(v).toFixed(2); }
function fmtSign(v) { if(v===null||isNaN(v))return'—'; return (v>=0?'+':'')+fmt(v); }
function pct(v) { return (v===null||isNaN(v)) ? '—' : (v*100).toFixed(1)+'%'; }

// ── Filters ───────────────────────────────────────────────────────────────────
function buildFilters() {
  const years = new Set();
  for (const o of orders) { if(o.date) years.add(o.date.split('-')[0]); }
  const yEl = document.getElementById('filterYear');
  const curY = yEl.value;
  yEl.innerHTML = '<option value="">All Years</option>';
  [...years].sort().forEach(y => { const op=document.createElement('option'); op.value=y; op.textContent=y; if(y===curY)op.selected=true; yEl.appendChild(op); });
  const mFrom=document.getElementById('filterMonthFrom'), mTo=document.getElementById('filterMonthTo');
  const curF=mFrom.value, curT=mTo.value;
  const moOpts=MONTHS.map((m,i)=>`<option value="${i+1}">${m}</option>`).join('');
  mFrom.innerHTML='<option value="">From</option>'+moOpts;
  mTo.innerHTML='<option value="">To</option>'+moOpts;
  if(curF)mFrom.value=curF; if(curT)mTo.value=curT;
}
function setStatusFilter(f,btn) { statusFilter=f; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); }
function clearFilters() {
  document.getElementById('filterYear').value=''; document.getElementById('filterMonthFrom').value=''; document.getElementById('filterMonthTo').value='';
  statusFilter='all'; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); document.getElementById('fb-all').classList.add('active'); render();
}
function getFiltered() {
  const year=document.getElementById('filterYear').value;
  const mFrom=parseInt(document.getElementById('filterMonthFrom').value)||0;
  const mTo=parseInt(document.getElementById('filterMonthTo').value)||13;
  return orders.filter(o => {
    const [y,m]=(o.date||'').split('-'); const mo=parseInt(m)||0;
    if(year&&y!==year)return false; if(mFrom&&mo<mFrom)return false; if(mTo<13&&mo>mTo)return false;
    if(statusFilter==='shipped'&&o.deliveryMethod!=='shipped')return false;
    if(statusFilter==='hand'&&o.deliveryMethod!=='hand')return false;
    if(statusFilter==='pending'&&o.fulfillStatus!=='pending')return false;
    return true;
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  buildFilters();
  const filtered = getFiltered();
  let rev=0,exp=0,prof=0,sc=0,sk=0;
  for(const o of filtered) { const c=calcOrder(o); rev+=c.totalSale; exp+=c.totalExp; prof+=c.profit; sc+=c.shipCharged; sk+=c.shipCost; }
  document.getElementById('totalRevenue').textContent=fmt(rev);
  document.getElementById('totalExpenses').textContent=fmt(exp);
  document.getElementById('totalProfit').textContent=fmt(prof);
  const snet=sc-sk; const plEl=document.getElementById('shippingPL'); const plSub=document.getElementById('shippingPLsub');
  if(sc===0&&sk===0){plEl.textContent='—';plEl.className='stat-value neutral';plSub.textContent='';}
  else{plEl.textContent=fmtSign(snet);plEl.className='stat-value '+(snet>=0?'success':'terra');plSub.textContent=fmt(sc)+' charged · '+fmt(sk)+' cost';}

  const list=document.getElementById('ordersList');
  if(!filtered.length){list.innerHTML='<div class="empty-state"><div class="empty-dino">🦕</div><p>No orders match your filters.</p></div>';return;}
  const DL={shipped:'🚚 Shipped',hand:'🤝 Hand Delivered',tbd:'⏳ TBD'};
  const DC={shipped:'badge-shipped',hand:'badge-hand',tbd:'badge-tbd'};
  list.innerHTML=filtered.map(order=>{
    const ri=orders.indexOf(order); const c=calcOrder(order); const dm=order.deliveryMethod||'tbd';
    const isEditing=editingIdx===ri;
    const fc=order.fulfillStatus==='complete'?'status-complete':'status-pending';
    const ft=order.fulfillStatus==='complete'?'Complete':'Pending';
    const itemRows=order.items.map(item=>{
      const sale=(item.qty||1)*(item.unitPrice||0); const profit=item.expense!=null?sale-item.expense:null;
      return`<div class="line-item"><span class="item-name">${item.name||'Item'}</span><span class="item-num">${item.qty||1}</span><span class="item-num">${fmt(sale)}</span><span class="item-num">${item.expense!=null?fmt(item.expense):'<span class=\'tbd\'>TBD</span>'}</span><span class="item-profit">${profit!=null?fmt(profit):'<span class=\'tbd\'>TBD</span>'}</span><span></span></div>`;
    }).join('');
    let shipRow='';
    if(dm==='hand')shipRow=`<div class="ship-detail-row"><span class="ship-detail-label">Delivery:</span><span class="delivery-badge badge-hand" style="margin-left:0">🤝 Hand delivered — no shipping</span></div>`;
    else if(dm==='tbd')shipRow=`<div class="ship-detail-row"><span class="ship-detail-label">Delivery:</span><span class="tbd">TBD</span></div>`;
    else if(c.shipCharged||c.shipCost){const net=c.shipCharged-c.shipCost;shipRow=`<div class="ship-detail-row"><span class="ship-detail-label">🚚 Ship:</span><span class="ship-detail-label">Charged</span><span class="ship-detail-val ship-charged">${c.shipCharged?fmt(c.shipCharged):'—'}</span><span class="ship-detail-label">Cost</span><span class="ship-detail-val ship-cost">${c.shipCost?fmt(c.shipCost):'—'}</span><span class="ship-detail-label">Net</span><span class="ship-detail-val ${net>=0?'ship-net-pos':'ship-net-neg'}">${fmtSign(net)}</span></div>`;}
    else if(dm==='shipped')shipRow=`<div class="ship-detail-row"><span class="ship-detail-label">🚚 Shipped —</span><span class="tbd">shipping details TBD</span></div>`;
    return`<div class="order-group" id="og-${ri}" style="${isEditing?'outline:2px solid var(--terra);outline-offset:-2px;':''}">
      <div class="order-group-header" onclick="toggleGroup(${ri})">
        <span class="order-id-badge">${order.id}</span>
        <span class="order-customer">${order.customer}</span>
        <span class="delivery-badge ${DC[dm]}">${DL[dm]}</span>
        <span class="order-date">${order.date}</span>
        <span class="order-status ${fc}">${ft}</span>
        <span class="chevron open" id="chev-${ri}">▾</span>
      </div>
      <div id="group-body-${ri}">
        ${itemRows}${shipRow}
        <div class="order-subtotal">
          ${order.notes?`<span class="order-note">${order.notes}</span>`:''}
          <span class="subtotal-item"><span class="subtotal-label">Sale:</span><span class="subtotal-val">${fmt(c.totalSale)}</span></span>
          <span class="subtotal-item"><span class="subtotal-label">Exp:</span><span class="subtotal-val" style="color:var(--terra)">${fmt(c.totalExp)}</span></span>
          <span class="subtotal-item"><span class="subtotal-label">Profit:</span><span class="subtotal-val" style="color:var(--success)">${fmt(c.profit)}</span></span>
          <span class="subtotal-item"><span class="subtotal-label">Margin:</span><span class="subtotal-val">${pct(c.margin)}</span></span>
          <span class="row-actions">
            <button class="icon-btn edit" onclick="event.stopPropagation();startEdit(${ri})" title="Edit">✏️</button>
            <button class="icon-btn del" onclick="event.stopPropagation();deleteOrder(${ri})" title="Delete">✕</button>
          </span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleGroup(idx){const b=document.getElementById(`group-body-${idx}`),c=document.getElementById(`chev-${idx}`);if(!b)return;const h=b.style.display==='none';b.style.display=h?'':'none';if(c)c.classList.toggle('open',h);}

async function deleteOrder(idx) {
  if(editingIdx===idx)cancelEdit();
  if(!confirm(`Delete order ${orders[idx].id}?`))return;
  const id=orders[idx].id;
  orders.splice(idx,1);
  render();
  setSyncStatus('syncing','Saving...');
  try{await deleteOrderFromSheet(id);setSyncStatus('synced',`Synced · ${orders.length} orders`);toast('Order deleted');}
  catch(e){setSyncStatus('error','Sync error');toast('Delete failed');}
}

// ── Edit ──────────────────────────────────────────────────────────────────────
function startEdit(idx) {
  editingIdx=idx; const o=orders[idx];
  document.getElementById('formTitle').textContent='✏️ Edit Order';
  document.getElementById('formBadge').style.display='';
  document.getElementById('submitBtn').textContent='Update Order 🦕';
  document.getElementById('cancelBtn').style.display='';
  document.getElementById('orderId').value=o.id;
  document.getElementById('customer').value=o.customer;
  document.getElementById('orderDate').value=o.date;
  document.getElementById('notes').value=o.notes||'';
  document.getElementById('payStatus').value=o.payStatus||'paid';
  document.getElementById('fulfillStatus').value=o.fulfillStatus||'complete';
  document.getElementById('deliveryMethod').value=o.deliveryMethod||'tbd';
  updateShipFields();
  setTimeout(()=>{
    const sc=document.getElementById('shipCharged'),sk=document.getElementById('shipCost');
    if(sc&&o.shipCharged!=null)sc.value=o.shipCharged;
    if(sk&&o.shipCost!=null)sk.value=o.shipCost;
  },10);
  document.getElementById('lineItemsContainer').innerHTML=''; lineCount=0;
  for(const item of o.items) addLineItem(item.name,item.qty,item.unitPrice,item.expense!=null?item.expense:'');
  document.querySelector('.form-card').scrollIntoView({behavior:'smooth'});
  render();
}
function cancelEdit(){editingIdx=null;document.getElementById('formTitle').textContent='+ New Order';document.getElementById('formBadge').style.display='none';document.getElementById('submitBtn').textContent='Save Order 🦕';document.getElementById('cancelBtn').style.display='none';resetForm();render();}

// ── Form ──────────────────────────────────────────────────────────────────────
function updateShipFields(){
  const method=document.getElementById('deliveryMethod').value, fields=document.getElementById('shipFields');
  if(method==='hand')fields.innerHTML='<div class="ship-na">🤝 No shipping — hand delivered!</div>';
  else if(method==='tbd')fields.innerHTML='<div class="ship-na">⏳ Fill in shipping details later</div>';
  else fields.innerHTML=`<div><label>Charged to customer ($)</label><input type="number" id="shipCharged" placeholder="e.g. 10.00" step="0.01" min="0"></div><div><label>Your actual cost ($)</label><input type="number" id="shipCost" placeholder="e.g. 4.80" step="0.01" min="0"></div>`;
}
function addLineItem(name='',qty='',price='',expense=''){
  lineCount++; const id=`li-${lineCount}`; const div=document.createElement('div');
  div.className='line-item-form'; div.id=id;
  const first=document.getElementById('lineItemsContainer').children.length===0;
  div.innerHTML=`<div>${first?'<label>Item</label>':''}<input type="text" placeholder="Item name" value="${name}" class="li-name"></div><div>${first?'<label>Qty</label>':''}<input type="number" placeholder="1" value="${qty}" min="1" class="li-qty" style="text-align:center"></div><div>${first?'<label>Price</label>':''}<input type="number" placeholder="0.00" value="${price}" step="0.01" min="0" class="li-price"></div><div>${first?'<label>Expense</label>':''}<input type="number" placeholder="0.00" value="${expense}" step="0.01" min="0" class="li-expense"></div>${lineCount>1?`<button class="remove-line" onclick="removeLine('${id}')">✕</button>`:'<span></span>'}`;
  document.getElementById('lineItemsContainer').appendChild(div);
}
function removeLine(id){const el=document.getElementById(id);if(el)el.remove();}
function resetForm(){
  document.getElementById('orderId').value=''; document.getElementById('customer').value='';
  document.getElementById('orderDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('notes').value=''; document.getElementById('payStatus').value='paid';
  document.getElementById('fulfillStatus').value='complete'; document.getElementById('deliveryMethod').value='shipped';
  updateShipFields(); document.getElementById('lineItemsContainer').innerHTML=''; lineCount=0; addLineItem();
}

async function submitOrder(){
  const customer=document.getElementById('customer').value.trim();
  if(!customer){toast('Please enter a customer name.');return;}
  const lineEls=document.querySelectorAll('#lineItemsContainer .line-item-form');
  const items=[];
  for(const el of lineEls){
    const name=el.querySelector('.li-name').value.trim();
    if(!name)continue;
    const expVal=el.querySelector('.li-expense').value;
    items.push({name,qty:parseInt(el.querySelector('.li-qty').value)||1,unitPrice:parseFloat(el.querySelector('.li-price').value)||0,expense:expVal!==''?parseFloat(expVal):null});
  }
  if(!items.length){toast('Please add at least one item.');return;}
  const dm=document.getElementById('deliveryMethod').value;
  const scEl=document.getElementById('shipCharged'), skEl=document.getElementById('shipCost');
  const entry={
    id:document.getElementById('orderId').value.trim()||(editingIdx!==null?orders[editingIdx].id:'ORD-'+String(orders.length+1).padStart(3,'0')),
    customer,date:document.getElementById('orderDate').value,items,
    deliveryMethod:dm,
    shipCharged:scEl&&scEl.value!==''?parseFloat(scEl.value):null,
    shipCost:skEl&&skEl.value!==''?parseFloat(skEl.value):null,
    notes:document.getElementById('notes').value,
    payStatus:document.getElementById('payStatus').value,
    fulfillStatus:document.getElementById('fulfillStatus').value
  };
  setSyncStatus('syncing','Saving...');
  try{
    if(editingIdx!==null){orders[editingIdx]=entry;await updateOrderInSheet(entry);}
    else{orders.push(entry);await saveNewOrder(entry);}
    setSyncStatus('synced',`Synced · ${orders.length} orders`);
    toast(editingIdx!==null?'Order updated!':'Order saved!');
    editingIdx=null; cancelEdit();
  }catch(e){setSyncStatus('error','Sync error — changes saved locally');toast('Sync failed, try again');console.error(e);}
}

function exportCSV(){
  const filtered=getFiltered();
  const rows=[['Order ID','Customer','Date','Delivery','Item','Qty','Unit Price','Item Sale','Item Expense','Ship Charged','Ship Cost','Ship Net','Total Sale','Total Expense','Profit','Margin','Notes','Pay','Fulfillment']];
  for(const o of filtered){
    const c=calcOrder(o);
    for(let i=0;i<o.items.length;i++){
      const item=o.items[i]; const sale=(item.qty||1)*(item.unitPrice||0);
      const exp=item.expense!=null?item.expense:''; const profit=exp!==''?sale-exp:'';
      const margin=exp!==''&&sale>0?((sale-exp)/sale*100).toFixed(1)+'%':'';
      rows.push([o.id,o.customer,o.date,o.deliveryMethod||'',item.name,item.qty||1,item.unitPrice||0,sale,exp,i===0&&c.shipCharged?c.shipCharged:'',i===0&&c.shipCost?c.shipCost:'',i===0?(c.shipNet||''):'',i===0?c.totalSale:'',i===0?c.totalExp:'',i===0?c.profit:'',i===0?pct(c.margin):'',i===0?o.notes:'',i===0?o.payStatus:'',i===0?o.fulfillStatus:'']);
    }
  }
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv); a.download='cxc_income_'+new Date().toISOString().split('T')[0]+'.csv'; a.click();
}

let toastTimer;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),3000);}
